name: TI2Vid CI

on:
  push:
    branches: [ "ti2vid-only" ]
  pull_request:
    branches: [ "ti2vid-only" ]

jobs:
  ti2vid-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install base tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "torch==2.3.1" "torchvision==0.18.1" "torchaudio==2.3.1" --index-url https://download.pytorch.org/whl/cpu
          python -m pip install "huggingface_hub>=0.24.6,<1.0"

      - name: Install ltx-core & ltx-pipelines (editable)
        run: |
          if [ -d "packages/ltx-core" ]; then
            python -m pip install -e "packages/ltx-core"
          fi
          if [ -d "packages/ltx-pipelines" ]; then
            python -m pip install -e "packages/ltx-pipelines"
          fi

      - name: Smoke test imports
        run: |
          python - << 'PY'
          import importlib

          print("Importing ltx_pipelines...")
          m = importlib.import_module("ltx_pipelines")
          print("ltx_pipelines imported:", m)

          PY

      - name: CLI --help for ti2vid_onestage
        run: |
          python -m ltx_pipelines.ti2vid_onestage --help || (
            echo "ti2vid_onestage CLI failed"; exit 1
          )
